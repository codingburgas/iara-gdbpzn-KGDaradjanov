<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Ticket - IARA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Special styling just to make the final result look like a real ticket */
        #ticketResult {
            display: none; /* Hidden until purchased */
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #0b3c5d, #328cc1);
            color: white;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: left;
            position: relative;
        }
        .ticket-header {
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px dashed rgba(255,255,255,0.5);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ticket-detail {
            margin-bottom: 8px;
            font-size: 15px;
        }
        .ticket-detail strong {
            color: #d9e8f5;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">IARA</div>
    <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        {% if session.get('username') %}
            <li><a href="{{ url_for('dashboard') }}">My Dashboard</a></li>
            <li><a href="{{ url_for('logout') }}">Logout ({{ session['username'] }})</a></li>
        {% else %}
            <li><a href="{{ url_for('login') }}">Login</a></li>
        {% endif %}
        <li><a href="{{ url_for('ticket') }}">Fishing Ticket</a></li>
    </ul>
</nav>

<main>
    <div class="ticket-container">
        <h2>Buy Fishing Ticket</h2>

        <div class="input-group">
            <label for="age">Age Group</label>
            <select id="age" onchange="calculate()">
                <option value="adult">Above 14 (Standard)</option>
                <option value="child">Under 14 (50% Discount)</option>
                <option value="pensioner">Pensioner (50% Discount)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="duration">Ticket Duration</label>
            <select id="duration" onchange="calculate()">
                <option value="day">1 Day</option>
                <option value="week">1 Week</option>
                <option value="year">1 Year</option>
            </select>
        </div>

        <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <input type="checkbox" id="disabled" onchange="calculate()" style="width: auto; margin: 0;">
            <label for="disabled" style="margin: 0;">Disabled (TELK) - Free</label>
        </div>

        <h3 id="price" style="text-align: center; color: #328cc1; margin-bottom: 20px;">Price: 5.0 €</h3>

        <button onclick="buy()">Purchase Ticket</button>

        <div id="ticketResult"></div>
    </div>
</main>

<script src="{{ url_for('static', filename='js/ticket.js') }}"></script>

</body>
</html>
